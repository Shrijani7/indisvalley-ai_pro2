<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Career Engine</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #0f172a, #1e293b);
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .container {
        width: 90%;
        max-width: 700px;
        padding: 30px;
        border-radius: 20px;
        background: rgba(255, 255, 255, 0.05);
        backdrop-filter: blur(15px);
        box-shadow: 0 0 40px rgba(168, 85, 247, 0.3);
    }

    h1 {
        text-align: center;
        margin-bottom: 20px;
        font-size: 32px;
    }

    textarea, input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border-radius: 10px;
        border: none;
        outline: none;
        background: rgba(0,0,0,0.5);
        color: white;
    }

    button {
        width: 100%;
        padding: 12px;
        border: none;
        border-radius: 10px;
        background: #9333ea;
        color: white;
        font-size: 16px;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #6b21a8;
        box-shadow: 0 0 20px rgba(168, 85, 247, 0.8);
    }

    .result {
        margin-top: 20px;
        padding: 15px;
        border-radius: 10px;
        background: rgba(0,0,0,0.6);
        white-space: pre-wrap;
    }
</style>
</head>

<body>

<div class="container">
    <h1>🚀 AI Career Intelligence</h1>

    <textarea id="jobs" placeholder="Paste job descriptions (one per line)"></textarea>

    <input id="skills" placeholder="All skills (comma separated)">
    <input id="userSkills" placeholder="Your skills">

    <button onclick="analyze()">Analyze</button>

    <div id="output" class="result"></div>
</div>

<script>
async function analyze() {
    const jobs = document.getElementById("jobs").value.split("\n");
    const skills = document.getElementById("skills").value.split(",");
    const userSkills = document.getElementById("userSkills").value.split(",");

    const res = await fetch("http://127.0.0.1:8000/analyze-market", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            jobs: jobs,
            skills: skills,
            user_skills: userSkills
        })
    });

    const data = await res.json();

    document.getElementById("output").innerText =
        "🔥 Market Demand:\n" + JSON.stringify(data.market_demand, null, 2) +
        "\n\n📊 Weights:\n" + JSON.stringify(data.weights, null, 2) +
        "\n\n🎯 Learn Next:\n" + data.recommended.join(", ");
}
</script>

</body>
</html>
